apiVersion: apps/v1
kind: Deployment
metadata:
  name: emplus-api
  namespace: emplus-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emplus-api
  template:
    metadata:
      labels:
        app: emplus-api
    spec:
      containers:
        - name: api
          image: emplus-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: emplus-api-config
            - secretRef:
                name: emplus-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: emplus-api
  namespace: emplus-local
spec:
  type: NodePort
  selector:
    app: emplus-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
