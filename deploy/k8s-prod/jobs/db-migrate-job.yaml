apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: ghcr.io/OWNER/emplus-api:REPLACE_ME
          imagePullPolicy: IfNotPresent
          workingDir: /app/api
          env:
            - name: NODE_ENV
              value: production
          envFrom:
            - configMapRef:
                name: emplus-api-config
            - secretRef:
                name: emplus-secrets
          command: ["bun", "src/db/migrate.ts"]

