name: Deploy API (k3s on VPS)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
      image_tag:
        description: "Container tag (default: git sha)"
        required: false

concurrency:
  group: deploy-api-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.environment }}
    env:
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/emplus-api
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}

      - name: Deploy via SSH (kubectl on VPS)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            if ! command -v k3s >/dev/null 2>&1; then
              echo "k3s not found on VPS. Install k3s first." >&2
              exit 1
            fi

            ENVIRONMENT="${{ inputs.environment }}"
            if [[ "$ENVIRONMENT" == "prod" ]]; then
              NS="emplus-prod"
              OVERLAY="deploy/k8s-prod/overlays/prod"
              HOST="api.emplus.app"
            else
              NS="emplus-staging"
              OVERLAY="deploy/k8s-prod/overlays/staging"
              HOST="api-staging.emplus.app"
            fi

            IMAGE="${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}"

            # Apply manifests (namespace + configmap + ingress + deployment/service)
            sudo k3s kubectl apply -k "$OVERLAY"

            # Force image to the pushed tag
            sudo k3s kubectl -n "$NS" set image deployment/emplus-api api="$IMAGE"

            # Run migrations as a one-off Job (uses same ConfigMap/Secret envFrom)
            sudo k3s kubectl -n "$NS" delete job db-migrate --ignore-not-found
            sudo k3s kubectl -n "$NS" apply -f - <<YAML
            apiVersion: batch/v1
            kind: Job
            metadata:
              name: db-migrate
            spec:
              backoffLimit: 1
              ttlSecondsAfterFinished: 300
              template:
                spec:
                  restartPolicy: Never
                  containers:
                    - name: db-migrate
                      image: ${IMAGE}
                      imagePullPolicy: IfNotPresent
                      workingDir: /app/api
                      envFrom:
                        - configMapRef:
                            name: emplus-api-config
                        - secretRef:
                            name: emplus-secrets
                      command: ["bun", "src/db/migrate.ts"]
            YAML
            sudo k3s kubectl -n "$NS" wait --for=condition=complete job/db-migrate --timeout=300s

            # Rollout API
            sudo k3s kubectl -n "$NS" rollout status deployment/emplus-api --timeout=300s

            echo "Deployed: $IMAGE"
            echo "Expected host: https://$HOST"

