name: Deploy Web (Cloudflare Pages)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - prod
      branch:
        description: "Pages branch (default: main for prod, staging for staging)"
        required: false

concurrency:
  group: deploy-web-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web (Astro)
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
        run: bun run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT_PROD: ${{ secrets.CF_PAGES_PROJECT_PROD }}
          CF_PAGES_PROJECT_STAGING: ${{ secrets.CF_PAGES_PROJECT_STAGING }}
          ENVIRONMENT: ${{ inputs.environment }}
          BRANCH_INPUT: ${{ inputs.branch }}
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" || -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "Missing Cloudflare credentials. Set secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

          if [[ "$ENVIRONMENT" == "prod" ]]; then
            PROJECT_NAME="${CF_PAGES_PROJECT_PROD:-emplus-web}"
            DEFAULT_BRANCH="main"
          else
            PROJECT_NAME="${CF_PAGES_PROJECT_STAGING:-emplus-web-staging}"
            DEFAULT_BRANCH="staging"
          fi

          BRANCH="${BRANCH_INPUT:-$DEFAULT_BRANCH}"

          echo "Deploying ./dist to Pages project: ${PROJECT_NAME} (branch: ${BRANCH})"
          bunx wrangler@latest pages deploy ./dist --project-name "${PROJECT_NAME}" --branch "${BRANCH}"

